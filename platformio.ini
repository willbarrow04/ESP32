[env:esp32s3]
platform = espressif32
; TODO: confirm exact board ID for your clone before first flash
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 16MB
build_flags =
  -DBOARD_HAS_PSRAM
  ; Uncomment to get mbedTLS rejection detail on TLS handshake failures:
  ; -DCORE_DEBUG_LEVEL=4

; WiFiClientSecure, HTTPClient, and time.h are all in the ESP32 Arduino core —
; no extra lib_deps required.

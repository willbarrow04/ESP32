[env:esp32s3]
platform = espressif32
; TODO: confirm exact board ID for your clone before first flash
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
monitor_dtr = 0
monitor_rts = 0
build_type = debug
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 16MB
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DBOARD_HAS_PSRAM

lib_deps =
  bblanchon/ArduinoJson@^6.21.5

; WiFiClientSecure, HTTPClient, and time.h are all in the ESP32 Arduino core.
